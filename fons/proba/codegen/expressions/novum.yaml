# Verte expressions - new/constructor calls (⇢ operator)
# Maps Faber ⇢ to target-language object instantiation
#
# Postfix syntax: { fields } ⇢ Type
# Bare form: {} ⇢ Type
#
# Note: ts/py use exact match; rs/cpp/zig use contains (they wrap in main)

- name: bare constructor
  source:fixum p ← {} ⇢ Persona
  expect:
      ts: 'const p = new Persona();'
      py: 'p = Persona()'
      rs:
          - 'let p = Persona::new();'
      cpp:
          - 'Persona{}'
      zig:
          - 'Persona.init(.{})'
      fab:
          - '{} ⇢ Persona'

- name: bare constructor (Error)
  source:'fixum e ← {} ⇢ Error'
  expect:
      ts: 'const e = new Error();'
      py: 'e = Error()'
      rs:
          - 'let e = Error::new();'
      cpp:
          - 'Error{}'
      zig:
          - 'Error.init(.{})'
      fab:
          - '{} ⇢ Error'

- name: with object literal overrides
  source:'fixum u ← { nomen: "Marcus", aetas: 30 } ⇢ User'
  expect:
      ts: 'const u = new User({ nomen: "Marcus", aetas: 30 });'
      py: 'u = User({"nomen": "Marcus", "aetas": 30})'
      rs:
          - 'let u = User { nomen: "Marcus", aetas: 30 };'
      cpp:
          - 'User{.nomen = '
          - '.aetas = 30}'
      zig:
          - 'User.init(.{ .nomen = "Marcus", .aetas = 30 })'
      fab:
          - '{ nomen: "Marcus", aetas: 30 } ⇢ User'

- name: with single property override
  source:'fixum item ← { pretium: 99 } ⇢ Item'
  expect:
      ts: 'const item = new Item({ pretium: 99 });'
      py: 'item = Item({"pretium": 99})'
      rs:
          - 'let item = Item { pretium: 99 };'
      cpp:
          - 'Item{.pretium = 99}'
      zig:
          - 'Item.init(.{ .pretium = 99 })'
      fab:
          - '{ pretium: 99 } ⇢ Item'

- name: with spread in overrides
  source:'fixum u ← { sparge defaults, extra: 1 } ⇢ User'
  expect:
      ts: 'const u = new User({ ...defaults, extra: 1 });'
      py: 'u = User({**defaults, "extra": 1})'
      fab:
          - '{ sparge defaults, extra: 1 } ⇢ User'

- name: with nested object
  source:'fixum c ← { database: { host: "localhost" } } ⇢ Config'
  expect:
      ts: 'const c = new Config({ database: { host: "localhost" } });'
      py: 'c = Config({"database": {"host": "localhost"}})'
      fab:
          - '{ database: { host: "localhost" } } ⇢ Config'

