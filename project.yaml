name: faber
description: Faber language repository centered on the radix Rust workspace.

projects:
  - name: radix-workspace
    path: radix
    type: workspace
    language: rust
    description: Canonical Cargo workspace for the active compiler and Rust runtime crates.
    deploy: none
    status: active

  - name: radix
    path: radix/crates/radix
    type: compiler
    language: rust
    description: Primary Faber compiler implementation and current CI gate.
    deploy: none
    status: active

  - name: norma
    path: radix/crates/norma
    type: library
    language: rust
    description: Rust runtime support crate for standard library and HAL features.
    deploy: none
    status: active

  - name: norma-stdlib
    path: radix/stdlib/norma
    type: library
    language: faber
    description: Faber standard library definitions and target translation metadata.
    deploy: none
    status: active

  - name: exempla
    path: examples/exempla
    type: library
    language: faber
    description: Example Faber programs used for demonstration and validation.
    deploy: none
    status: active

  - name: explain
    path: explain
    type: documentation
    language: markdown
    description: Embedded user-facing reference corpus for faber explain.
    deploy: none
    status: active

  - name: ebnf
    path: EBNF.md
    type: documentation
    language: markdown
    description: Formal grammar and spec commentary for the active language surface.
    deploy: none
    status: active

  - name: docs
    path: docs
    type: documentation
    language: markdown
    description: Design notes, delivery plans, and historical analysis.
    deploy: none
    status: active
