name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    create-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
              run: |
                  gh release create "$TAG" \
                      --repo "$GITHUB_REPOSITORY" \
                      --verify-tag \
                      --title "$TAG" \
                      --notes-file docs/factory/faber-radix-tool-split/release-notes-v0.34.md

    build:
        needs: create-release
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                    - os: macos-14
                      target: aarch64-apple-darwin
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v5
            - name: Install Rust
              run: rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
            - name: Build faber and radix
              run: |
                  cargo +stable build --release -p faber --target "${{ matrix.target }}"
                  cargo +stable build --release -p radix --bin radix --target "${{ matrix.target }}"
            - name: Package assets
              shell: bash
              env:
                  TAG: ${{ github.ref_name }}
                  TARGET: ${{ matrix.target }}
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  for tool in faber radix; do
                      asset="${tool}-${TAG}-${TARGET}"
                      mkdir -p "dist/$asset"
                      cp "target/${TARGET}/release/${tool}" "dist/$asset/${tool}"
                      (cd dist && tar -czf "$asset.tar.gz" "$asset")
                      if command -v shasum >/dev/null 2>&1; then
                          (cd dist && shasum -a 256 "$asset.tar.gz" > "$asset.tar.gz.sha256")
                      else
                          (cd dist && sha256sum "$asset.tar.gz" > "$asset.tar.gz.sha256")
                      fi
                  done
            - name: Upload release assets
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
              run: gh release upload "$TAG" dist/*.tar.gz dist/*.sha256 --repo "$GITHUB_REPOSITORY" --clobber
