name: CI

on:
    pull_request:
    workflow_dispatch:

jobs:
    radix-rs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - name: Format check
              run: cargo fmt --manifest-path fons/radix-rs/Cargo.toml --all -- --check
            - name: Test radix-rs
              run: cargo test --manifest-path fons/radix-rs/Cargo.toml
