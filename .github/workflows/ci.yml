name: CI

on:
    pull_request:
    workflow_dispatch:

jobs:
    radix:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Install Rust
              run: rustup toolchain install stable --profile minimal --component rustfmt
            - name: Format check
              run: cargo +stable fmt --manifest-path radix/Cargo.toml --all -- --check
            - name: Test radix workspace
              run: cargo +stable test --manifest-path radix/Cargo.toml
